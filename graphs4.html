<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Mariposa Domain – Step Nodes with Fixed Size</title>
    <script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/layout-base@2.0.1/layout-base.js"></script>
    <script src="https://unpkg.com/cose-base@2.2.0/cose-base.js"></script>
    <script src="https://unpkg.com/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f7fa;
        }
        #cy {
            width: 100%;
            height: 100%;
            position: absolute;
            left: 0;
            top: 0;
            background: linear-gradient(135deg, #fafafa 0%, #f0f2f5 100%);
        }
        .info {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.98);
            padding: 12px 20px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 500;
            color: #1e2b3a;
            box-shadow: 0 8px 24px rgba(0, 20, 40, 0.15);
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            max-width: 600px;
        }
        .info span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.06);
            font-size: 12px;
        }
        .legend-doc { background: #e1f5e0; border-left: 4px solid #2e7d32; padding-left: 8px; }
        .legend-nav { background: #ffe0b0; border-left: 4px solid #bf8f00; padding-left: 8px; }
        .legend-dash { background: #ffd0d0; border-left: 4px solid #c62828; padding-left: 8px; }
        .legend-page { background: #d0d0ff; border-left: 4px solid #283593; padding-left: 8px; }
        .legend-input { background: #fff3e0; border: 2px dashed #f39c12; }
        .legend-step { background: #f0f0f0; border-left: 4px solid #7f8c8d; padding-left: 8px; }
    </style>
</head>
<body>
    <div id="cy"></div>
    <div class="info">
        <span class="legend-doc">📘 Documentation</span>
        <span class="legend-nav">🧭 Navbar</span>
        <span class="legend-dash">📊 Dashboard</span>
        <span class="legend-page">📄 Pages</span>
        <span class="legend-input">✏️ Input field</span>
        <span class="legend-step">📋 Step</span>
    </div>

                    randomize: true,
                    animate: true,
                    animationDuration: 1000,

                }
            });

            cy.on('tap', 'node', function(evt) {
                const node = evt.target;
                const url = node.data('url');
                if (url && url !== '#') {
                    window.open(url, '_blank');
                } else {
                    const type = node.data('type') || 'unknown';
                    const parent = node.data('parent') || 'none';
                    alert(
                        'Node: ' + node.data('label') + 
                        '\nType: ' + type + 
                        '\nParent: ' + parent +
                        '\nID: ' + node.id()
                    );
                }
            });

            cy.on('layoutstop', function() {
                cy.fit(undefined, 80);
            });
        })();
    </script>
</body>
</html>
